<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Trinidad & Tobago 2026</title>

<!-- PWA -->
<meta name="theme-color" content="#0d9488" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Trini '26" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />

<style>
  :root{
    --teal-900:#0f3d3e;
    --teal-700:#0d7377;
    --teal-600:#0d9488;
    --teal-500:#14b8a6;
    --teal-100:#d3f3ee;
    --sand:#fbf3e4;
    --sand-2:#f5e7cf;
    --coral:#ff6f5e;
    --coral-dark:#e85a4a;
    --sun:#ffb84d;
    --ink:#123536;
    --muted:#5c7a78;
    --line:#e3ddcf;
    --white:#ffffff;
    --ok:#1f9d63;
    --shadow:0 6px 22px rgba(15,61,62,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);
    background:linear-gradient(180deg,#e9f7f4 0%, var(--sand) 40%);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--teal-700)}

  /* ── Login overlay ── */
  #loginOverlay{
    position:fixed;inset:0;z-index:999;
    background:radial-gradient(120% 120% at 80% -10%, var(--teal-500) 0%, var(--teal-700) 55%, var(--teal-900) 100%);
    display:flex;align-items:center;justify-content:center;
  }
  #loginOverlay.hidden{display:none}
  .login-box{
    background:#fff;border-radius:20px;padding:36px 28px;width:min(360px,92vw);
    box-shadow:0 20px 60px rgba(0,0,0,.25);text-align:center;
  }
  .login-box h2{margin:0 0 6px;font-size:1.4rem;color:var(--teal-900)}
  .login-box p{margin:0 0 24px;font-size:.88rem;color:var(--muted)}
  .login-box label{display:block;text-align:left;font-size:.78rem;font-weight:700;
    text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px;margin-top:14px}
  .login-box input[type=text],.login-box input[type=password]{
    width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;
    font-size:.95rem;outline:none;transition:.15s}
  .login-box input:focus{border-color:var(--teal-500);box-shadow:0 0 0 3px var(--teal-100)}
  .login-box .remember{display:flex;align-items:center;gap:8px;margin-top:14px;font-size:.85rem;color:var(--muted);cursor:pointer}
  .login-box .remember input{width:18px;height:18px;cursor:pointer;accent-color:var(--teal-600)}
  .login-btn{
    margin-top:22px;width:100%;padding:13px;background:var(--teal-600);color:#fff;
    border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;transition:.15s}
  .login-btn:active{transform:translateY(1px)}
  .login-err{color:var(--coral-dark);font-size:.82rem;margin-top:10px;min-height:18px}

  /* Header */
  header.app{
    position:relative;
    background:radial-gradient(120% 120% at 80% -10%, var(--teal-500) 0%, var(--teal-700) 55%, var(--teal-900) 100%);
    color:#fff;
    padding:calc(env(safe-area-inset-top) + 20px) 18px 22px;
    border-bottom-left-radius:22px;
    border-bottom-right-radius:22px;
    box-shadow:var(--shadow);
    overflow:hidden;
  }
  header.app .tt-flag{
    position:absolute;top:12px;right:14px;
    width:42px;height:42px;border-radius:50%;
    overflow:hidden;box-shadow:0 0 14px rgba(0,0,0,.3);opacity:.95;flex-shrink:0;
  }
  header.app .tt-flag img{width:100%;height:100%;object-fit:cover}
  header.app .logout-btn{
    position:absolute;top:12px;right:66px;
    background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
    color:#fff;border-radius:999px;padding:5px 11px;font-size:.7rem;font-weight:700;
    cursor:pointer;backdrop-filter:blur(4px);transition:.15s;letter-spacing:.3px;white-space:nowrap;
  }
  header.app .logout-btn:hover{background:rgba(255,255,255,.25)}
  header.app h1{margin:0;font-size:1.4rem;letter-spacing:.3px;line-height:1.2;padding-right:120px}
  header.app .sub{margin-top:4px;font-size:.82rem;opacity:.92;padding-right:120px}
  @media(max-width:400px){
    header.app h1{font-size:1.15rem;padding-right:110px}
    header.app .sub{font-size:.76rem;padding-right:110px}
    header.app .tt-flag{width:36px;height:36px;top:14px;right:12px}
    header.app .logout-btn{right:56px;font-size:.65rem;padding:4px 9px}
  }
  .countdown{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
  .cd-box{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.22);
    backdrop-filter:blur(4px);border-radius:12px;padding:8px 12px;text-align:center;min-width:60px}
  .cd-box b{display:block;font-size:1.35rem;line-height:1}
  .cd-box span{font-size:.62rem;text-transform:uppercase;letter-spacing:1px;opacity:.85}
  .cd-note{margin-top:10px;font-size:.8rem;opacity:.92}

  /* Tabs */
  nav.tabs{
    position:sticky;top:0;z-index:20;
    display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;
    padding:10px 12px;margin-top:-2px;
    background:linear-gradient(180deg, rgba(251,243,228,.96), rgba(251,243,228,.86));
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  nav.tabs::-webkit-scrollbar{display:none}
  nav.tabs button{
    flex:0 0 auto;border:1px solid var(--line);background:#fff;color:var(--muted);
    padding:8px 13px;border-radius:999px;font-size:.82rem;font-weight:600;cursor:pointer;
    display:flex;align-items:center;gap:6px;transition:.15s;
  }
  nav.tabs button .ic{font-size:.95rem}
  nav.tabs button.active{background:var(--teal-600);color:#fff;border-color:var(--teal-600);box-shadow:var(--shadow)}
  /* Mobile: tighter tabs — emoji + short label, smaller padding */
  @media(max-width:480px){
    nav.tabs button{padding:7px 9px;font-size:.72rem;gap:4px}
    nav.tabs button .ic{font-size:.85rem}
  }
  @media(max-width:380px){
    nav.tabs button .tab-lbl{display:none}
    nav.tabs button{padding:8px 10px}
    nav.tabs button .ic{font-size:1.1rem}
  }

  main{max-width:760px;margin:0 auto;padding:16px 14px 40px}
  .panel{display:none;animation:fade .25s ease}
  .panel.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  h2.section{font-size:1.15rem;margin:6px 2px 12px;display:flex;align-items:center;gap:8px}
  .hint{font-size:.8rem;color:var(--muted);margin:0 2px 14px}

  .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:15px;margin-bottom:12px;box-shadow:var(--shadow)}
  .card h3{margin:0 0 4px;font-size:1rem}
  .card .meta{font-size:.82rem;color:var(--muted)}
  .pill{display:inline-block;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
    padding:3px 9px;border-radius:999px;background:var(--teal-100);color:var(--teal-700);vertical-align:middle}
  .pill.coral{background:#ffe3de;color:var(--coral-dark)}
  .pill.sun{background:#fff0d6;color:#a86a12}
  .pill.grey{background:#eef1ef;color:#5c7a78}

  /* Flight card */
  .flight{display:flex;align-items:center;gap:12px}
  .flight .route{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
  .flight .code{font-weight:800;font-size:1.15rem;letter-spacing:1px}
  .flight .arrow{color:var(--coral);font-weight:800}
  .flight .times{font-size:.82rem;color:var(--muted);margin-top:2px}
  .flight-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap}

  /* itinerary */
  .day{position:relative}
  .day .datechip{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;
    background:var(--teal-600);color:#fff;border-radius:12px;width:52px;height:52px;flex:0 0 auto}
  .day .datechip b{font-size:1.15rem;line-height:1}
  .day .datechip span{font-size:.58rem;text-transform:uppercase;letter-spacing:1px}
  .day-row{display:flex;gap:12px;align-items:flex-start}
  .day-row .body{flex:1;min-width:0}
  .day .title{font-weight:700;font-size:.98rem}
  .day ul{margin:8px 0 0;padding-left:18px}
  .day ul li{font-size:.86rem;margin:3px 0;color:#274d4d}

  /* Editable itinerary */
  .edit-title{
    font-weight:700;font-size:.98rem;border:none;background:transparent;
    width:100%;outline:none;color:var(--ink);padding:0;
    border-bottom:1px dashed transparent;transition:.15s;
  }
  .edit-title:hover,.edit-title:focus{border-bottom-color:var(--teal-500);background:rgba(20,184,166,.05);border-radius:4px;padding:2px 4px}
  .item-row{display:flex;align-items:center;gap:6px;margin:3px 0}
  .item-row input{
    flex:1;font-size:.86rem;color:#274d4d;border:none;background:transparent;
    outline:none;padding:2px 4px;border-bottom:1px dashed transparent;transition:.15s;
    font-family:inherit;
  }
  .item-row input:hover,.item-row input:focus{border-bottom-color:var(--teal-500);background:rgba(20,184,166,.05);border-radius:4px}
  .item-del{background:none;border:none;color:#c7bfae;font-size:1rem;cursor:pointer;padding:0 3px;line-height:1;flex:0 0 auto}
  .item-del:hover{color:var(--coral)}
  .add-item-row{display:flex;gap:6px;margin-top:8px;align-items:center}
  .add-item-row input{flex:1;font-size:.84rem;padding:6px 10px;border:1px dashed var(--line);border-radius:8px;background:#fffdf8;font-family:inherit;outline:none}
  .add-item-row input:focus{border-color:var(--teal-500)}
  .add-item-row button{font-size:.78rem;padding:6px 10px;background:var(--teal-100);color:var(--teal-700);border:none;border-radius:8px;cursor:pointer;font-weight:700}

  /* checklist */
  ul.check{list-style:none;margin:0;padding:0}
  ul.check li{display:flex;align-items:center;gap:11px;padding:9px 4px;border-bottom:1px solid #f0ece0}
  ul.check li:last-child{border-bottom:none}
  ul.check input[type=checkbox]{appearance:none;-webkit-appearance:none;width:22px;height:22px;flex:0 0 auto;
    border:2px solid var(--teal-500);border-radius:7px;cursor:pointer;position:relative;transition:.12s;background:#fff}
  ul.check input[type=checkbox]:checked{background:var(--teal-600);border-color:var(--teal-600)}
  ul.check input[type=checkbox]:checked::after{content:"";position:absolute;left:6px;top:2px;width:6px;height:11px;
    border:solid #fff;border-width:0 3px 3px 0;transform:rotate(45deg)}
  ul.check label{flex:1;font-size:.92rem;cursor:pointer}
  ul.check li.done label{text-decoration:line-through;color:#9db3b1}
  .del{background:none;border:none;color:#c7bfae;font-size:1.15rem;cursor:pointer;padding:2px 6px;line-height:1}
  .del:hover{color:var(--coral)}
  .progress{height:8px;background:#eef1ef;border-radius:999px;overflow:hidden;margin:2px 2px 12px}
  .progress > i{display:block;height:100%;background:linear-gradient(90deg,var(--teal-500),var(--teal-600));width:0;transition:width .3s}
  .count-badge{font-size:.78rem;color:var(--muted);font-weight:600}

  .addrow{display:flex;gap:8px;margin-top:12px}
  .addrow input{flex:1;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:.9rem;background:#fff}
  .addrow input:focus{outline:2px solid var(--teal-100);border-color:var(--teal-500)}
  .btn{background:var(--teal-600);color:#fff;border:none;border-radius:10px;padding:10px 14px;font-weight:700;font-size:.88rem;cursor:pointer}
  .btn:active{transform:translateY(1px)}
  .btn.coral{background:var(--coral)}
  .btn.ghost{background:#fff;color:var(--teal-700);border:1px solid var(--line)}
  .btn.sm{padding:7px 12px;font-size:.8rem}
  .btn.danger{background:#fff;color:var(--coral-dark);border:1px solid #f5c6c0}

  textarea.note{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;font-family:inherit;
    font-size:.92rem;min-height:90px;resize:vertical;background:#fffdf8}
  textarea.note:focus{outline:2px solid var(--teal-100);border-color:var(--teal-500)}
  .note-lbl{font-size:.72rem;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;margin:8px 2px 6px}

  /* Editable stays */
  .stay-field{
    width:100%;border:none;background:transparent;font-size:.86rem;color:var(--ink);
    padding:2px 4px;border-bottom:1px dashed transparent;transition:.15s;font-family:inherit;outline:none;
  }
  .stay-field:hover,.stay-field:focus{border-bottom-color:var(--teal-500);background:rgba(20,184,166,.05);border-radius:4px}
  .stay-field.big{font-size:.98rem;font-weight:700}
  .stay-field.small{font-size:.82rem;color:var(--muted)}
  .stay-row{margin:4px 0;display:flex;align-items:baseline;gap:6px}
  .stay-row b{font-size:.82rem;color:var(--teal-700);flex:0 0 auto;white-space:nowrap}

  /* contacts */
  .contact input{width:100%;border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-size:.9rem;margin-top:6px;background:#fff}
  .contact .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .contact-head{display:flex;justify-content:space-between;align-items:center}
  @media(max-width:520px){.contact .grid{grid-template-columns:1fr}}

  .kv{font-size:.86rem;margin:6px 0;line-height:1.5}
  .kv b{color:var(--teal-700)}
  details.dir{margin-top:8px}
  details.dir summary{cursor:pointer;font-size:.82rem;color:var(--teal-700);font-weight:600}
  details.dir p{font-size:.82rem;color:#3a5a59;line-height:1.55;margin:8px 0 0}

  .who{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .who span{font-size:.72rem;background:var(--sand-2);color:#6b5a34;padding:3px 9px;border-radius:999px}

  /* Packing collapsible */
  .pack-section{border:1px solid var(--line);border-radius:16px;margin-bottom:12px;overflow:hidden;background:#fff;box-shadow:var(--shadow)}
  .pack-header{
    display:flex;justify-content:space-between;align-items:center;
    padding:13px 15px;cursor:pointer;user-select:none;
    background:#fff;transition:.15s;
  }
  .pack-header:hover{background:rgba(20,184,166,.04)}
  .pack-header h3{margin:0;font-size:1rem;display:flex;align-items:center;gap:8px}
  .pack-toggle{font-size:1rem;color:var(--muted);transition:transform .2s;flex:0 0 auto}
  .pack-toggle.open{transform:rotate(180deg)}
  .pack-body{padding:0 15px 15px;border-top:1px solid var(--line)}
  .pack-body.collapsed{display:none}

  /* Attachments */
  .attach-drop{
    border:2px dashed var(--line);border-radius:14px;padding:30px 20px;text-align:center;
    color:var(--muted);font-size:.9rem;cursor:pointer;transition:.15s;background:#fffdf8;
  }
  .attach-drop:hover,.attach-drop.drag{border-color:var(--teal-500);background:var(--teal-100);color:var(--teal-700)}
  .attach-drop .icon{font-size:2rem;display:block;margin-bottom:6px}
  .attach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:14px}
  .attach-card{
    border:1px solid var(--line);border-radius:12px;padding:12px;background:#fff;
    display:flex;flex-direction:column;gap:6px;position:relative;
    box-shadow:0 2px 8px rgba(15,61,62,.07);
  }
  .attach-card .a-icon{font-size:1.8rem;text-align:center}
  .attach-card .a-name{font-size:.78rem;font-weight:600;color:var(--ink);word-break:break-word;line-height:1.3}
  .attach-card .a-meta{font-size:.7rem;color:var(--muted)}
  .attach-card .a-del{
    position:absolute;top:6px;right:6px;background:none;border:none;
    color:#c7bfae;font-size:1rem;cursor:pointer;padding:2px 5px;line-height:1;border-radius:6px;
  }
  .attach-card .a-del:hover{color:var(--coral);background:#fff0ee}
  .attach-card .a-dl{
    font-size:.72rem;background:var(--teal-100);color:var(--teal-700);border:none;
    border-radius:8px;padding:5px 8px;cursor:pointer;font-weight:700;text-align:center;
  }
  .attach-card .a-dl:hover{background:var(--teal-500);color:#fff}
  .attach-card img.thumb{width:100%;height:90px;object-fit:cover;border-radius:8px}
  .attach-section-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;
    color:var(--muted);margin:18px 2px 8px;display:flex;align-items:center;gap:8px}
  .attach-section-label::after{content:"";flex:1;height:1px;background:var(--line)}

  .save-flash{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:9px 16px;border-radius:999px;font-size:.82rem;opacity:0;
    transition:.25s;pointer-events:none;z-index:50;box-shadow:var(--shadow)}
  .save-flash.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .banner{background:#fff7e8;border:1px solid #f2e2bf;color:#7a5b1a;border-radius:12px;padding:10px 13px;font-size:.82rem;margin-bottom:14px}
</style>
</head>
<body>

<!-- ══════════ LOGIN OVERLAY ══════════ -->
<div id="loginOverlay">
  <div class="login-box">
    <div style="font-size:2.5rem;margin-bottom:8px">🌴</div>
    <h2>Trinidad &amp; Tobago 2026</h2>
    <p>Family trip planner — please sign in</p>
    <label for="li-user">Username</label>
    <input type="text" id="li-user" placeholder="username" autocomplete="username" />
    <label for="li-pass">Password</label>
    <input type="password" id="li-pass" placeholder="password" autocomplete="current-password" />
    <label class="remember">
      <input type="checkbox" id="li-remember" /> Remember me for 30 days
    </label>
    <button class="login-btn" id="li-btn">Sign in</button>
    <div class="login-err" id="li-err"></div>
  </div>
</div>

<!-- ══════════ APP ══════════ -->
<div id="app" style="display:none">

<header class="app">
  <button class="logout-btn" id="logoutBtn">Sign out</button>
  <div class="tt-flag"><img src="icons/tt-circle-01.png" alt="Trinidad & Tobago" /></div>
  <h1>🌴 Trinidad &amp; Tobago 2026</h1>
  <div class="sub">Family trip · Aug 17 – Aug 31 · Ryan, Wendy, Mia &amp; Mavis</div>
  <div class="countdown" id="countdown"></div>
  <div class="cd-note" id="cdNote"></div>
</header>

<nav class="tabs" id="tabs">
  <button data-tab="overview" class="active"><span class="ic">🏝️</span><span class="tab-lbl">Overview</span></button>
  <button data-tab="itinerary"><span class="ic">🗓️</span><span class="tab-lbl">Itinerary</span></button>
  <button data-tab="flights"><span class="ic">✈️</span><span class="tab-lbl">Flights</span></button>
  <button data-tab="stays"><span class="ic">🏠</span><span class="tab-lbl">Stays</span></button>
  <button data-tab="packing"><span class="ic">🧳</span><span class="tab-lbl">Packing</span></button>
  <button data-tab="daisy"><span class="ic">🐶</span><span class="tab-lbl">Daisy</span></button>
  <button data-tab="contacts"><span class="ic">📇</span><span class="tab-lbl">Contacts</span></button>
  <button data-tab="notes"><span class="ic">📝</span><span class="tab-lbl">Notes</span></button>
  <button data-tab="attachments"><span class="ic">📎</span><span class="tab-lbl">Files</span></button>
</nav>

<main>
  <section class="panel active" id="overview"></section>
  <section class="panel" id="itinerary"></section>
  <section class="panel" id="flights"></section>
  <section class="panel" id="stays"></section>
  <section class="panel" id="packing"></section>
  <section class="panel" id="daisy"></section>
  <section class="panel" id="contacts"></section>
  <section class="panel" id="notes"></section>
  <section class="panel" id="attachments"></section>
</main>

</div><!-- /#app -->

<div class="save-flash" id="flash">Saved ✓</div>

<script>
/* ============================================================
   Trinidad & Tobago 2026 — trip planner
   All data lives in the browser (localStorage). No server needed.
   ============================================================ */

/* ────────────────────────────────────────────
   AUTH
──────────────────────────────────────────── */
const AUTH_KEY  = "trini-auth-2026";
const VALID_USER = "wendy";
const VALID_PASS = "daisy";

function checkAuth(){
  try{
    const a = JSON.parse(localStorage.getItem(AUTH_KEY));
    if(a && a.user === VALID_USER && a.expires > Date.now()) return true;
  }catch(e){}
  return false;
}

function doLogin(){
  const u = document.getElementById("li-user").value.trim().toLowerCase();
  const p = document.getElementById("li-pass").value;
  const rem = document.getElementById("li-remember").checked;
  if(u === VALID_USER && p === VALID_PASS){
    const expires = rem ? Date.now() + 30*24*60*60*1000 : 0;
    localStorage.setItem(AUTH_KEY, JSON.stringify({user:u, expires: rem ? expires : Date.now()+4*60*60*1000}));
    document.getElementById("loginOverlay").classList.add("hidden");
    document.getElementById("app").style.display = "";
    initApp();
  } else {
    document.getElementById("li-err").textContent = "Incorrect username or password.";
    document.getElementById("li-pass").value = "";
  }
}

document.getElementById("li-btn").addEventListener("click", doLogin);
document.getElementById("li-pass").addEventListener("keydown", e => { if(e.key==="Enter") doLogin(); });
document.getElementById("li-user").addEventListener("keydown", e => { if(e.key==="Enter") document.getElementById("li-pass").focus(); });

// Always start with app hidden; only show after confirmed auth
document.getElementById("app").style.display = "none";
if(checkAuth()){
  document.getElementById("loginOverlay").classList.add("hidden");
  document.getElementById("app").style.display = "";
  initApp();
} else {
  // ensure login overlay is visible and app is hidden
  document.getElementById("loginOverlay").classList.remove("hidden");
  document.getElementById("app").style.display = "none";
}

/* ────────────────────────────────────────────
   INIT APP (called after login)
──────────────────────────────────────────── */
function initApp(){
  let state = null;
  let attachments = [];

  /* ── Flash helper ── */
  let flashTimer;
  function showFlash(msg, isError){
    const f = document.getElementById("flash");
    f.textContent = msg;
    f.style.background = isError ? "var(--coral-dark)" : "var(--ink)";
    f.classList.add("show");
    clearTimeout(flashTimer);
    flashTimer = setTimeout(()=>f.classList.remove("show"), isError ? 3500 : 1100);
  }

  /* ── Save state to Postgres via API ── */
  let saveTimer;
  function save(){
    // optimistic local cache so UI feels instant
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){}
    clearTimeout(saveTimer);
    saveTimer = setTimeout(()=>{
      fetch("/api/state", {
        method:"PUT",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify(state)
      }).then(r=>{
        if(r.ok) showFlash("Saved ✓", false);
        else     showFlash("⚠️ Server save failed", true);
      }).catch(()=> showFlash("⚠️ Offline — saved locally only", true));
    }, 400); // debounce 400ms so rapid typing doesn't hammer the DB
  }

  /* ── Attachment API helpers ── */
  function apiPostAttachment(record){
    return fetch("/api/attachments",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(record)
    }).catch(e=>console.warn("attach upload failed",e));
  }
  function apiPutAttachment(id, cat){
    return fetch("/api/attachments/"+id,{
      method:"PUT",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({cat})
    }).catch(e=>console.warn("attach update failed",e));
  }
  function apiDeleteAttachment(id){
    return fetch("/api/attachments/"+id,{method:"DELETE"})
      .catch(e=>console.warn("attach delete failed",e));
  }
  function apiGetAttachment(id){
    return fetch("/api/attachments/"+id).then(r=>r.json())
      .catch(()=>null);
  }

  /* ── Boot: load state + attachment list from server, then init UI ── */
  function prepareState(raw){
    if(!raw) raw = {};
    // merge with seed so any missing keys are filled in
    const s = seed();
    if(raw.flights)   s.flights   = raw.flights;
    if(raw.itinerary) s.itinerary = raw.itinerary;
    if(raw.stays)     s.stays     = raw.stays;
    if(raw.packing)   s.packing   = raw.packing;
    if(raw.daisy)     s.daisy     = raw.daisy;
    if(raw.contacts)  s.contacts  = raw.contacts;
    if(raw.todo)      s.todo      = raw.todo;
    if(raw.text)      s.text      = raw.text;
    if(!s.text) s.text = {};
    // migrate old packing format
    if(s.packing && !s.packing.lists){
      s.packing = { lists:[
        {id:"p-ryan",  label:"Ryan",  emoji:"👨", items: s.packing.Ryan  || []},
        {id:"p-wendy", label:"Wendy", emoji:"👩", items: s.packing.Wendy || []}
      ]};
    }
    return s;
  }

  Promise.all([
    fetch("/api/state").then(r=>r.json()).catch(()=>null),
    fetch("/api/attachments").then(r=>r.json()).catch(()=>[])
  ]).then(([rawState, attList])=>{
    // if server returned nothing, try localStorage cache
    if(!rawState){
      try{ rawState = JSON.parse(localStorage.getItem(STORE_KEY)); }catch(e){}
    }
    state = prepareState(rawState);
    // attachments list (no data yet — loaded on demand when Files tab opens)
    attachments = attList || [];
    bootUI();
  }).catch(()=>{
    // full offline fallback
    let rawState = null;
    try{ rawState = JSON.parse(localStorage.getItem(STORE_KEY)); }catch(e){}
    state = prepareState(rawState);
    attachments = [];
    bootUI();
  });

  /* ---------- Helpers ---------- */
  const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
  const esc=s=>String(s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
  const uid=()=>"x"+Math.random().toString(36).slice(2,9);

  /* ---------- Countdown ---------- */
  function renderCountdown(){
    const dep=new Date("2026-08-17T18:30:00-04:00");
    const ret=new Date("2026-08-31T07:10:00-04:00");
    const now=new Date();
    const box=document.getElementById("countdown");
    const note=document.getElementById("cdNote");
    box.innerHTML="";
    if(now>=ret){ note.textContent="Welcome home! 🌴 Hope it was amazing."; return; }
    if(now>=dep && now<ret){
      note.textContent="You're in Trinidad & Tobago right now — enjoy every minute! 🏝️";
      const daysLeft=Math.ceil((ret-now)/86400000);
      box.appendChild(mkBox(daysLeft,"days left"));
      return;
    }
    const diff=dep-now;
    const d=Math.floor(diff/86400000);
    const h=Math.floor(diff%86400000/3600000);
    const m=Math.floor(diff%3600000/60000);
    box.appendChild(mkBox(d,"days"));
    box.appendChild(mkBox(h,"hours"));
    box.appendChild(mkBox(m,"mins"));
    note.textContent="Countdown to takeoff ✈️";
  }
  function mkBox(n,l){const b=el("div","cd-box");b.innerHTML="<b>"+n+"</b><span>"+l+"</span>";return b;}

  /* ---------- Editable note field ---------- */
  function noteField(key,label,ph){
    const wrap=el("div");
    if(label) wrap.appendChild(el("div","note-lbl",label));
    const ta=el("textarea","note");
    ta.placeholder=ph||"Type here…";
    ta.value=state.text[key]||"";
    ta.addEventListener("input",()=>{state.text[key]=ta.value;save();});
    wrap.appendChild(ta);
    return wrap;
  }

  /* ---------- Checklist renderer ---------- */
  function checklist(ns, items, {allowAdd=true, addPh="Add item…", onChange}={}){
    const wrap=el("div");
    const prog=el("div","progress"); const bar=el("i"); prog.appendChild(bar);
    const badge=el("div","count-badge");
    wrap.appendChild(badge); wrap.appendChild(prog);
    const ul=el("ul","check");
    function doneKey(item){return "done:"+ns+":"+item;}
    function refresh(){
      const total=items.length;
      const done=items.filter(i=>state.text[doneKey(i)]).length;
      bar.style.width=(total?Math.round(done/total*100):0)+"%";
      badge.textContent=done+" / "+total+" done";
    }
    function draw(){
      ul.innerHTML="";
      items.forEach((item)=>{
        const li=el("li"); const id=uid();
        const cb=el("input"); cb.type="checkbox"; cb.id=id;
        const on=!!state.text[doneKey(item)];
        cb.checked=on; if(on) li.classList.add("done");
        cb.addEventListener("change",()=>{
          state.text[doneKey(item)]=cb.checked;
          li.classList.toggle("done",cb.checked); refresh(); save();
        });
        const lb=el("label"); lb.htmlFor=id; lb.textContent=item;
        const del=el("button","del","×"); del.title="Remove";
        del.addEventListener("click",()=>{
          const ix=items.indexOf(item); if(ix>-1)items.splice(ix,1);
          delete state.text[doneKey(item)];
          if(onChange)onChange(); draw(); refresh(); save();
        });
        li.appendChild(cb); li.appendChild(lb); li.appendChild(del);
        ul.appendChild(li);
      });
    }
    wrap.appendChild(ul);
    if(allowAdd){
      const row=el("div","addrow");
      const inp=el("input"); inp.type="text"; inp.placeholder=addPh;
      const b=el("button","btn","Add");
      const add=()=>{const v=inp.value.trim(); if(!v)return; items.push(v); inp.value="";
        if(onChange)onChange(); draw(); refresh(); save();};
      b.addEventListener("click",add);
      inp.addEventListener("keydown",e=>{if(e.key==="Enter")add();});
      row.appendChild(inp); row.appendChild(b); wrap.appendChild(row);
    }
    draw(); refresh();
    return wrap;
  }

  /* ═══════════════════════════════════════════
     RENDERERS
  ═══════════════════════════════════════════ */

  function renderOverview(){
    const p=document.getElementById("overview"); p.innerHTML="";
    p.appendChild(el("h2","section","🏝️ Trip at a glance"));

        Everything you check or type is saved right on this device — no login needed after first sign-in.

  /* ── ITINERARY (editable) ── */
  function renderItinerary(){
    const p=document.getElementById("itinerary"); p.innerHTML="";
    p.appendChild(el("h2","section","🗓️ Day-by-day"));
    p.appendChild(el("p","hint","Tap any title or bullet to edit. Use + to add items."));
    state.itinerary.forEach((day, dayIdx)=>{
      const card=el("div","card day");
      const row=el("div","day-row");

      // date chip
      const chip=el("div","datechip"); chip.style.background=
        day.tone==="coral"?"var(--coral)":(day.tone==="sun"?"var(--sun)":"var(--teal-600)");
      if(day.tone==="sun") chip.style.color="#5a3d05";
      chip.innerHTML=`<b>${day.d}</b><span>${day.dow}</span>`;

      const body=el("div","body");

      // editable title
      const titleInp = el("input","edit-title");
      titleInp.value = day.title;
      titleInp.addEventListener("input", ()=>{ day.title = titleInp.value; save(); });
      body.appendChild(titleInp);

      // editable items list
      const itemsWrap = el("div"); itemsWrap.style.marginTop = "8px";

      function drawItems(){
        itemsWrap.innerHTML = "";
        day.items.forEach((item, idx)=>{
          const ir = el("div","item-row");
          const bullet = el("span"); bullet.textContent = "•"; bullet.style.cssText="color:var(--teal-600);flex:0 0 auto;font-size:.9rem";
          const inp = el("input");
          inp.value = item;
          inp.addEventListener("input", ()=>{ day.items[idx] = inp.value; save(); });
          const delBtn = el("button","item-del","×"); delBtn.title="Remove";
          delBtn.addEventListener("click", ()=>{ day.items.splice(idx,1); drawItems(); save(); });
          ir.appendChild(bullet); ir.appendChild(inp); ir.appendChild(delBtn);
          itemsWrap.appendChild(ir);
        });
        // add item row
        const addRow = el("div","add-item-row");
        const addInp = el("input"); addInp.placeholder = "Add item…";
        const addBtn = el("button"); addBtn.textContent = "+ Add";
        const doAdd = ()=>{
          const v = addInp.value.trim(); if(!v) return;
          day.items.push(v); addInp.value = ""; drawItems(); save();
        };
        addBtn.addEventListener("click", doAdd);
        addInp.addEventListener("keydown", e=>{ if(e.key==="Enter") doAdd(); });
        addRow.appendChild(addInp); addRow.appendChild(addBtn);
        itemsWrap.appendChild(addRow);
      }
      drawItems();
      body.appendChild(itemsWrap);

      row.appendChild(chip); row.appendChild(body);
      card.appendChild(row);
      card.appendChild(noteField("day:"+day.d,"","Notes / changes for Aug "+day.d+"…"));
      p.appendChild(card);
    });
  }

  function renderFlights(){
    const p=document.getElementById("flights"); p.innerHTML="";

  /* ── STAYS (editable) ── */
  function renderStays(){
    const p=document.getElementById("stays"); p.innerHTML="";
    p.appendChild(el("h2","section","🏠 Where we're staying"));
    p.appendChild(el("p","hint","Tap any field to edit stay details."));

    function drawStays(){
      // remove existing stay cards (keep h2 and hint)
      while(p.children.length > 2) p.removeChild(p.lastChild);

      state.stays.forEach((s, sIdx)=>{
        const card = el("div","card");

        // header row with name + tag + delete
        const hrow = el("div","flight-head");
        const nameInp = el("input","stay-field big");
        nameInp.value = s.name;
        nameInp.style.flex="1";
        nameInp.addEventListener("input",()=>{ s.name=nameInp.value; save(); });

        const tagInp = el("input","pill");
        tagInp.style.cssText="border:1px dashed var(--line);background:var(--teal-100);color:var(--teal-700);font-size:.68rem;padding:3px 9px;border-radius:999px;width:120px;text-align:center;outline:none";
        if(s.tagClass==="coral") tagInp.style.cssText+="background:#ffe3de;color:var(--coral-dark);";
        if(s.tagClass==="sun")   tagInp.style.cssText+="background:#fff0d6;color:#a86a12;";
        tagInp.value = s.tag;
        tagInp.addEventListener("input",()=>{ s.tag=tagInp.value; save(); });

        const delBtn = el("button","del","×"); delBtn.title="Remove stay";
        delBtn.addEventListener("click",()=>{ state.stays.splice(sIdx,1); drawStays(); save(); });

        hrow.appendChild(nameInp); hrow.appendChild(tagInp); hrow.appendChild(delBtn);
        card.appendChild(hrow);

        // editable field helper
        function stayRow(label, field, ph, type="text"){
          const row = el("div","stay-row");
          const lbl = el("b"); lbl.textContent = label+":"; row.appendChild(lbl);
          const inp = el("input","stay-field small");
          inp.type = type; inp.placeholder = ph; inp.value = s[field]||"";
          inp.addEventListener("input",()=>{ s[field]=inp.value; save(); });
          row.appendChild(inp); card.appendChild(row);
        }
        stayRow("Host","host","Host name");
        stayRow("Confirmation","conf","Booking ref / conf #");
        stayRow("Check-in","checkin","Date & time");
        stayRow("Checkout","checkout","Date & time");
        stayRow("Address","address","Street address");

        // directions (textarea)
        if(s.directions !== undefined){
          const dlbl = el("div","note-lbl","Directions"); card.appendChild(dlbl);
          const dta = el("textarea","note"); dta.style.minHeight="70px";
          dta.placeholder="Directions from host…"; dta.value=s.directions||"";
          dta.addEventListener("input",()=>{ s.directions=dta.value; save(); });
          card.appendChild(dta);
        }

        card.appendChild(noteField("stay:"+s.id,"Notes","Notes for this stay…"));
        p.appendChild(card);
      });

      // Add new stay button
      const addBtn = el("button","btn ghost","+ Add stay");
      addBtn.style.width="100%";
      addBtn.addEventListener("click",()=>{
        state.stays.push({id:uid(),name:"New stay",tag:"",tagClass:"",host:"",conf:"",checkin:"",checkout:"",address:"",directions:"",note:""});
        drawStays(); save();
      });
      p.appendChild(addBtn);
    }
    drawStays();
  }

  /* ── PACKING (collapsible + add list) ── */
  function renderPacking(){
    const p=document.getElementById("packing"); p.innerHTML="";
    p.appendChild(el("h2","section","🧳 Packing lists"));
    p.appendChild(el("p","hint","Tap ▾ to expand/collapse. Tap a box to mark packed. Add lists for each traveller."));

    const OPEN_KEY = "pack-open-state";
    let openSections;
    try{ openSections = JSON.parse(localStorage.getItem(OPEN_KEY)) || {}; }
    catch(e){ openSections = {}; }
    function saveOpen(){ try{ localStorage.setItem(OPEN_KEY, JSON.stringify(openSections)); }catch(e){} }

    function drawPacking(){
      while(p.children.length > 2) p.removeChild(p.lastChild);

      state.packing.lists.forEach((list, lIdx)=>{
        const isOpen = openSections[list.id] !== false; // default open

        const section = el("div","pack-section");

        // header
        const header = el("div","pack-header");
        const h3 = el("h3");
        h3.innerHTML = `<span>${list.emoji||"🧳"}</span> `;
        const nameInp = document.createElement("input");
        nameInp.value = list.label;
        nameInp.style.cssText="border:none;background:transparent;font-size:1rem;font-weight:700;color:var(--ink);outline:none;padding:0;font-family:inherit;width:auto;max-width:180px";
        nameInp.addEventListener("click",e=>e.stopPropagation());
        nameInp.addEventListener("input",()=>{ list.label=nameInp.value; save(); });
        h3.appendChild(nameInp);

        const emojiInp = document.createElement("input");
        emojiInp.value = list.emoji||"🧳";
        emojiInp.maxLength=2;
        emojiInp.title="Emoji icon";
        emojiInp.style.cssText="border:none;background:transparent;font-size:.9rem;outline:none;width:28px;margin-left:4px;font-family:inherit;color:var(--muted);padding:0";
        emojiInp.addEventListener("click",e=>e.stopPropagation());
        emojiInp.addEventListener("input",()=>{ list.emoji=emojiInp.value; h3.firstChild.textContent=list.emoji+" "; save(); });

        const delListBtn = el("button","del","×");
        delListBtn.title = "Remove this list";
        delListBtn.style.marginLeft="6px";
        delListBtn.addEventListener("click",e=>{
          e.stopPropagation();
          if(confirm("Remove "+list.label+"'s packing list?")){
            state.packing.lists.splice(lIdx,1); drawPacking(); save();
          }
        });

        header.appendChild(h3);
        const rightSide = el("div"); rightSide.style.cssText="display:flex;align-items:center;gap:8px";
        const badge = el("span","count-badge");
        const toggle = el("span","pack-toggle"+(isOpen?" open":""),"▾");
        rightSide.appendChild(emojiInp); rightSide.appendChild(delListBtn); rightSide.appendChild(badge); rightSide.appendChild(toggle);
        header.appendChild(rightSide);

        // body
        const body = el("div","pack-body"+(isOpen?"":" collapsed"));

        const cl = checklist("pack-"+list.id, list.items, {addPh:"Add to "+list.label+"'s list…"});
        // update badge after checklist renders
        const badgeEl = cl.querySelector(".count-badge");
        if(badgeEl) badge.textContent = badgeEl.textContent;
        // keep badge in sync by observing changes
        const mo = new MutationObserver(()=>{ const b=cl.querySelector(".count-badge"); if(b) badge.textContent=b.textContent; });
        mo.observe(cl, {childList:true, subtree:true, characterData:true});

        body.appendChild(cl);
        section.appendChild(header);
        section.appendChild(body);

        header.addEventListener("click",()=>{
          const nowOpen = body.classList.contains("collapsed");
          body.classList.toggle("collapsed", !nowOpen);
          toggle.classList.toggle("open", nowOpen);
          openSections[list.id] = nowOpen;
          saveOpen();
        });

        p.appendChild(section);
      });

      // Add new list
      const addRow = el("div","addrow");
      const inp = el("input"); inp.type="text"; inp.placeholder="New list name (e.g. Mia)";
      const btn = el("button","btn","+ Add list");
      const doAdd = ()=>{
        const v = inp.value.trim(); if(!v) return;
        state.packing.lists.push({id:uid(), label:v, emoji:"🧳", items:[]});
        inp.value=""; drawPacking(); save();
      };
      btn.addEventListener("click", doAdd);
      inp.addEventListener("keydown", e=>{ if(e.key==="Enter") doAdd(); });
      addRow.appendChild(inp); addRow.appendChild(btn);
      p.appendChild(addRow);
    }
    drawPacking();
  }

  function renderDaisy(){
    const p=document.getElementById("daisy"); p.innerHTML="";
    p.appendChild(el("h2","section","🐶 Daisy — Clovelly Kennels"));
    const info=el("div","card");
    info.innerHTML=`
      <div class="flight-head"><h3 style="margin:0">Boarding stay</h3><span class="pill coral">Aug 17 – 31</span></div>
      <div class="kv"><b>Where:</b> Clovelly Kennels</div>
      <div class="kv"><b>Drop-off:</b> Mon, Aug 17 (before we leave for the airport)</div>
      <div class="kv"><b>Pick-up:</b> Mon, Aug 31 (after we land, 7:10 AM)</div>`;
    p.appendChild(info);
    const card=el("div","card");
    card.appendChild(el("h3",null,"Daisy's checklist"));
    card.appendChild(checklist("daisy", state.daisy.checklist, {addPh:"Add for Daisy…"}));
    p.appendChild(card);
    const notes=el("div","card");
    notes.appendChild(el("h3",null,"Kennel notes"));
    notes.appendChild(noteField("daisy-notes","","Feeding schedule, vet info, quirks, pick-up instructions…"));
    p.appendChild(notes);
  }

  function renderContacts(){
    const p=document.getElementById("contacts"); p.innerHTML="";
    p.appendChild(el("h2","section","📇 Contacts"));
    p.appendChild(el("p","hint","Tap a field to add phone numbers and notes."));
    const list=el("div"); p.appendChild(list);
    function draw(){
      list.innerHTML="";
      state.contacts.forEach(c=>{
        const card=el("div","card contact");
        const head=el("div","contact-head");
        head.innerHTML=`<h3 style="margin:0">${esc(c.name||"New contact")}</h3>`;
        const del=el("button","del","×");
        del.addEventListener("click",()=>{state.contacts=state.contacts.filter(x=>x.id!==c.id);draw();save();});
        head.appendChild(del);
        card.appendChild(head);
        const role=el("div","meta"); role.textContent=c.role||""; card.appendChild(role);
        const grid=el("div","grid");
        const pn=el("input");pn.type="tel";pn.placeholder="Phone";pn.value=c.phone||"";
        pn.addEventListener("input",()=>{c.phone=pn.value;save();});
        const nt=el("input");nt.type="text";nt.placeholder="Note";nt.value=c.note||"";
        nt.addEventListener("input",()=>{c.note=nt.value;save();});
        grid.appendChild(pn);grid.appendChild(nt);
        card.appendChild(grid);
        list.appendChild(card);
      });
    }
    draw();
    const row=el("div","addrow");
    const inp=el("input");inp.type="text";inp.placeholder="New contact name…";
    const b=el("button","btn","Add");
    const add=()=>{const v=inp.value.trim();if(!v)return;state.contacts.push({id:uid(),name:v,role:"",phone:"",note:""});inp.value="";draw();save();};
    b.addEventListener("click",add);
    inp.addEventListener("keydown",e=>{if(e.key==="Enter")add();});
    row.appendChild(inp);row.appendChild(b);p.appendChild(row);
  }

  function renderNotes(){
    const p=document.getElementById("notes"); p.innerHTML="";
    p.appendChild(el("h2","section","📝 Notes & to-do"));
    const td=el("div","card");
    td.appendChild(el("h3",null,"Pre-trip to-do"));
    td.appendChild(checklist("todo", state.todo, {addPh:"Add a to-do…"}));
    p.appendChild(td);
    const n=el("div","card");
    n.appendChild(el("h3",null,"Shared notes"));
    n.appendChild(noteField("shared-notes","","Anything and everything — gift ideas, food to buy, people to see…"));
    p.appendChild(n);
  }

  /* ── ATTACHMENTS ── */
  function fileIcon(type){
    if(type.startsWith("image/")) return "🖼️";
    if(type==="application/pdf") return "📄";
    if(type.includes("word")) return "📝";
    if(type.includes("sheet")||type.includes("excel")) return "📊";
    return "📎";
  }
  function fmtSize(b){ if(b<1024) return b+"B"; if(b<1048576) return (b/1024).toFixed(1)+"KB"; return (b/1048576).toFixed(1)+"MB"; }

  // categories
  const ATTACH_CATS = ["Flights","Stays","Insurance","Packing","Other"];

  function renderAttachments(){
    const p=document.getElementById("attachments"); p.innerHTML="";
    p.appendChild(el("h2","section","📎 Files & attachments"));
    p.appendChild(el("p","hint","Upload boarding passes, confirmations, travel insurance, and other documents. Stored on this device only."));

    function drawAttachments(){
      // remove old content below hint
      while(p.children.length > 2) p.removeChild(p.lastChild);

      // upload area
      const dropArea = el("div","attach-drop");
      dropArea.innerHTML=`<span class="icon">📎</span>Tap to upload a file`;
      const fileInput = document.createElement("input");
      fileInput.type="file"; fileInput.multiple=true; fileInput.hidden=true;
      fileInput.accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt,.png,.jpg,.jpeg";

      dropArea.addEventListener("click",()=>fileInput.click());
      dropArea.addEventListener("dragover",e=>{e.preventDefault();dropArea.classList.add("drag");});
      dropArea.addEventListener("dragleave",()=>dropArea.classList.remove("drag"));
      dropArea.addEventListener("drop",e=>{e.preventDefault();dropArea.classList.remove("drag");handleFiles(e.dataTransfer.files);});
      fileInput.addEventListener("change",()=>handleFiles(fileInput.files));

      function handleFiles(files){
        Array.from(files).forEach(file=>{
          if(file.size > 10*1024*1024){ alert(file.name+" is too large (max 10 MB)."); return; }
          const reader = new FileReader();
          reader.onload = ev =>{
            const record = {
              id: uid(),
              name: file.name,
              type: file.type,
              size: file.size,
              data: ev.target.result,
              cat: "Other",
              date: new Date().toISOString().slice(0,10)
            };
            // Upload to server (Postgres)
            apiPostAttachment(record).then(r=>{
              if(r && r.ok){
                attachments.push({id:record.id,name:record.name,type:record.type,size:record.size,cat:record.cat,added:record.date});
                showFlash("File uploaded ✓", false);
                drawAttachments();
              } else {
                showFlash("⚠️ Upload failed", true);
              }
            });
          };
          reader.onerror = ()=> showFlash("⚠️ Could not read that file.", true);
          reader.readAsDataURL(file);
        });
        fileInput.value = "";
      }

      p.appendChild(dropArea);
      p.appendChild(fileInput);

      if(attachments.length === 0){
        const empty = el("div","card");
        empty.style.textAlign="center";
        empty.style.color="var(--muted)";
        empty.style.padding="28px";
        empty.innerHTML="<div style='font-size:2rem;margin-bottom:8px'>📂</div>No files uploaded yet.";
        p.appendChild(empty);
        return;
      }

      // Group by category
      ATTACH_CATS.forEach(cat=>{
        const catFiles = attachments.filter(a=>a.cat===cat);
        if(catFiles.length===0) return;

        p.appendChild(el("div","attach-section-label",cat));
        const grid = el("div","attach-grid");

        catFiles.forEach(a=>{
          const card = el("div","attach-card");
          const isImg = a.type.startsWith("image/");

          if(isImg){
            const img = document.createElement("img");
            img.className="thumb"; img.src=a.data; img.alt=a.name;
            card.appendChild(img);
          } else {
            card.appendChild(el("div","a-icon",fileIcon(a.type)));
          }

          card.appendChild(el("div","a-name",esc(a.name)));
          card.appendChild(el("div","a-meta",fmtSize(a.size)+" · "+a.date));

          // category selector
          const sel = document.createElement("select");
          sel.style.cssText="font-size:.72rem;border:1px solid var(--line);border-radius:6px;padding:3px 5px;background:#fff;color:var(--ink);width:100%;margin-top:2px";
          ATTACH_CATS.forEach(c=>{ const o=document.createElement("option");o.value=c;o.textContent=c;if(c===a.cat)o.selected=true; sel.appendChild(o); });
          sel.addEventListener("change",()=>{
            a.cat = sel.value;
            apiPutAttachment(a.id, a.cat);
            drawAttachments();
          });
          card.appendChild(sel);

          // download button — fetch full data from server then trigger download
          const dl = el("button","a-dl","⬇ Download");
          dl.addEventListener("click",()=>{
            dl.textContent="⏳";
            apiGetAttachment(a.id).then(full=>{
              dl.textContent="⬇ Download";
              if(!full || !full.data){ showFlash("⚠️ Could not load file", true); return; }
              const anchor=document.createElement("a");
              anchor.href=full.data; anchor.download=full.name; anchor.click();
            });
          });
          card.appendChild(dl);

          // delete button
          const del = el("button","a-del","×"); del.title="Remove";
          del.addEventListener("click",()=>{
            if(confirm("Remove "+a.name+"?")){
              attachments = attachments.filter(x=>x.id!==a.id);
              apiDeleteAttachment(a.id);
              drawAttachments();
            }
          });
          card.appendChild(del);
          grid.appendChild(card);
        }); // end catFiles.forEach
        p.appendChild(grid);
      }); // end ATTACH_CATS.forEach
    } // end drawAttachments

    drawAttachments();
  } // end renderAttachments

  /* ── bootUI: called once IDB is ready ── */
  const renderers={overview:renderOverview,itinerary:renderItinerary,flights:renderFlights,
    stays:renderStays,packing:renderPacking,daisy:renderDaisy,contacts:renderContacts,
    notes:renderNotes,attachments:renderAttachments};

  function bootUI(){
    document.getElementById("logoutBtn").addEventListener("click",()=>{
      localStorage.removeItem(AUTH_KEY);
      location.reload();
    });

    document.getElementById("tabs").addEventListener("click",e=>{
      const btn=e.target.closest("button"); if(!btn)return;
      const tab=btn.dataset.tab;
      document.querySelectorAll("nav.tabs button").forEach(b=>b.classList.toggle("active",b===btn));
      document.querySelectorAll(".panel").forEach(pn=>pn.classList.toggle("active",pn.id===tab));
      renderers[tab]();
      window.scrollTo({top:0,behavior:"smooth"});
    });

    renderOverview();
    renderCountdown();
    setInterval(renderCountdown,60000);

    if("serviceWorker" in navigator && location.protocol.startsWith("http")){
      window.addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); });
    }
  }
}
</script>
